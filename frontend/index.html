<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pro Predict Analytics</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
</head>
<body>
    <div class="app-container">
        <!-- Sidebar Navigation -->
        <aside class="sidebar">
            <div class="logo-area">
                <i class="fa-solid fa-basketball fa-2x text-accent"></i>
                <h2>Pro Predict</h2>
            </div>
            
            <div class="nav-section">
                <button class="nav-btn active" id="btn-home" onclick="goHome()">
                    <i class="fa-solid fa-house"></i>
                    Upcoming Top 10
                </button>
            </div>

            <div class="team-nav">
                <h3>All Teams</h3>
                <div class="team-list" id="team-list">
                    <!-- Dynamic team buttons will be injected here -->
                </div>
            </div>
        </aside>

        <!-- Main Dashboard -->
        <main class="dashboard">
            <header class="top-nav">
                <div class="header-content">
                    <h1 id="view-title">Loading...</h1>
                    <p class="subtitle" id="view-subtitle">Fetching prediction intel</p>
                </div>
                <div class="date-badge">
                    <i class="fa-solid fa-bolt text-accent"></i>
                    <span id="system-status">Live Analytics</span>
                </div>
            </header>

            <div class="content-area">
                <!-- Roster Data Grid -->
                <div class="roster-section" id="roster-section" style="opacity: 0; transition: opacity 0.3s ease;">
                    
                    <div class="roster-grid" id="roster-grid">
                        <!-- Dynamic player cards will be injected here -->
                    </div>
                </div>
                
                <div class="loading-state" id="loading-state">
                    <i class="fa-solid fa-circle-notch fa-spin fa-3x text-accent"></i>
                </div>
            </div>
        </main>
    </div>

    <!-- Fallback Silhouette SVG for broken headshots -->
    <svg style="display:none;">
        <symbol id="icon-user" viewBox="0 0 24 24">
            <path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/>
        </symbol>
    </svg>

    <script src="app.js?v=2"></script>
</body>
</html>
