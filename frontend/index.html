<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NBA Player Form Predictions</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="app-container">
        <!-- Sidebar Navigation -->
        <aside class="sidebar">
            <div class="logo-area">
                <i class="fa-solid fa-basketball fa-2x text-accent"></i>
                <h2>ProPredict</h2>
            </div>
            
            <div class="team-nav">
                <h3>NBA Teams</h3>
                <div class="team-list" id="team-list">
                    <!-- Dynamic team buttons will be injected here -->
                </div>
            </div>
        </aside>

        <!-- Main Dashboard -->
        <main class="dashboard">
            <header class="top-nav">
                <div class="header-content">
                    <h1 id="current-team-name">Select a Team</h1>
                    <p class="subtitle">Predicted Player Ratings & Form Analysis</p>
                </div>
                <div class="date-badge">
                    <i class="fa-regular fa-calendar"></i>
                    <span id="latest-game-date">Data Updated</span>
                </div>
            </header>

            <div class="content-area">
                <!-- Summary Stats -->
                <div class="stats-row" id="stats-row">
                    <!-- Dynamic stat cards -->
                </div>

                <!-- Roster Data Grid -->
                <div class="roster-section">
                    <div class="section-header">
                        <h2>Team Roster Form</h2>
                        <div class="filters">
                            <button class="active">Rating Desc</button>
                            <button>Trend Desc</button>
                        </div>
                    </div>
                    
                    <div class="roster-grid" id="roster-grid">
                        <!-- Dynamic player cards will be injected here -->
                        <div class="empty-state">
                            <i class="fa-solid fa-spinner fa-spin fa-3x"></i>
                            <p>Loading Prediction Data...</p>
                        </div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script src="app.js"></script>
</body>
</html>
