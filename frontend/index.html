<!DOCTYPE html>

<html>

<head>
    <title>NBA Fantasy Predictor</title>
    <style>
        body {
            font-family: Arial;
            background: #0f172a;
            color: white;
            text-align: center;
        }

        h1 {
            margin-top: 20px;
        }

        button {
            padding: 10px 16px;
            font-size: 14px;
            background: #f97316;
            /* ORANGE 🔥 */
            border: none;
            border-radius: 20px;
            cursor: pointer;
            color: white;
            transition: 0.2s;
        }

        button:hover {
            background: #ea580c;
        }

        .card {
            background: #1e293b;
            padding: 15px;
            width: 220px;
            border-radius: 12px;
            text-align: center;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.3);
            transition: 0.2s;
        }

        .card:hover {
            transform: translateY(-5px);
        }

        #playersContainer,
        #result {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 20px;
            margin-top: 20px;
        }

        .top-buttons {
            margin: 20px;
        }

        .top-buttons button {
            margin: 5px;
            padding: 12px 18px;
            font-size: 16px;
        }

        h1 {
            margin-top: 30px;
            margin-bottom: 10px;
        }

        .top-buttons {
            margin-bottom: 20px;
        }

        #teamsContainer {
            margin-top: 20px;
        }

        #playersContainer,
        #result {
            margin-top: 30px;
        }

        body {
            max-width: 1200px;
            margin: auto;
        }

        select {
            padding: 10px;
            font-size: 16px;
            border-radius: 8px;
            margin-top: 10px;
            background: #1e293b;
            color: white;
            border: none;
        }

        select:hover {
            cursor: pointer;
        }
    </style>

</head>

<body>

    <h1>🏀 NBA Fantasy Team Predictor</h1>
    <div class="top-buttons">
        <button onclick="getPrediction()">Top Players in the League</button>
    </div>

    <h2>🏀 Select a Team</h2>

    <select id="teamSelect" onchange="selectTeam()">
        <option value="">-- Choose a Team --</option>
    </select>

    <div id="playersContainer"></div>
    <div id="result"></div>

    <script src="script.js"></script>


</body>

</html>
